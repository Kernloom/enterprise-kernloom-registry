name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  validate-sign-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core
          path: kernloom-core
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core-registry
          path: kernloom-core-registry
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: sigstore/cosign-installer@v3
      - run: cd kernloom-core && go run ./cmd/kernloomctl registry validate --core-registry ../kernloom-core-registry --enterprise-registry ..
      - run: mkdir -p dist
      - run: tar --sort=name --owner=0 --group=0 --numeric-owner -czf dist/enterprise-kernloom-registry-artifacts.tar.gz enterprise bindings
      - run: sha256sum dist/enterprise-kernloom-registry-artifacts.tar.gz > dist/checksums.txt
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/enterprise-kernloom-registry.spdx.json
      - run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt
      - run: cosign sign-blob --yes --output-signature dist/enterprise-kernloom-registry.spdx.json.sig --output-certificate dist/enterprise-kernloom-registry.spdx.json.pem dist/enterprise-kernloom-registry.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: enterprise-kernloom-registry-release-artifacts
          path: dist/

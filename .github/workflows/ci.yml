name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core
          path: kernloom-core
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core-registry
          path: kernloom-core-registry
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: test -f enterprise/vocabulary.yaml
      - run: test -f enterprise/profiles.yaml
      - run: test -f bindings/stages.yaml
      - run: cd kernloom-core && go run ./cmd/kernloomctl registry validate --core-registry ../kernloom-core-registry --enterprise-registry ..
